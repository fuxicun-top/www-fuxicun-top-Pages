<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="找回密码 - 福溪村官网">
  <meta name="keywords" content="福溪村,找回密码">
  <title>找回密码 - 福溪村</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/login.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-logo">福溪村</h1>
        <p class="auth-subtitle">找回密码</p>
      </div>

      <!-- 步骤 1：分支①（绑定了邮箱的用户走这里） -->
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label">用户名或手机号</label>
          <input type="text" name="username" class="form-input" placeholder="请输入用户名或手机号" autocomplete="username">
        </div>

        <p class="form-hint" style="margin-bottom:16px;">
          输入用户名或手机号，如果该账号绑定了邮箱，我们将发送密码重置链接到您的邮箱。
        </p>

        <div class="turnstile-container" id="turnstile-container"></div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-send">发送重置邮件</button>

        <div style="text-align:center;margin-top:16px;">
          <a href="javascript:void(0)" id="link-no-email" class="auth-link" style="font-size:14px;color:var(--color-text-secondary);">我没有绑定邮箱怎么办？</a>
        </div>
      </form>

      <!-- 步骤 2：分支②（账号没绑邮箱，用手机号 + 接收邮箱重置） -->
      <form id="forgot-form-with-phone" style="display:none;">
        <p class="form-hint" style="margin-bottom:16px;color:var(--color-text-secondary);">
          请填写注册时的<strong>用户名 + 手机号</strong>进行身份校验，再填写一个能收到邮件的邮箱地址（可以是您家人或朋友的邮箱，仅用于本次接收重置链接，<strong>不会绑定到您的账号</strong>）。
        </p>

        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" name="username" class="form-input" placeholder="您注册时的用户名" autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label">注册时的手机号</label>
          <input type="tel" name="phone" class="form-input" placeholder="请输入注册时填写的手机号" autocomplete="tel">
        </div>

        <div class="form-group">
          <label class="form-label">接收邮箱（一次性投递，不绑定）</label>
          <input type="email" name="recipient_email" class="form-input" placeholder="例如 yourfamily@example.com" autocomplete="email">
          <p style="font-size:12px;color:var(--color-text-placeholder);margin-top:4px;">该邮箱仅用于本次接收重置链接，不会写入您的账号；如需正式绑定，请重置完成后到"个人中心 → 修改邮箱"自行设置。</p>
        </div>

        <div class="turnstile-container" id="turnstile-container-2"></div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-send-with-phone">发送重置邮件</button>

        <div style="text-align:center;margin-top:16px;">
          <a href="javascript:void(0)" id="link-back-to-email" class="auth-link" style="font-size:14px;color:var(--color-text-secondary);">← 返回上一步</a>
        </div>
      </form>

      <div class="auth-footer">
        <a href="/login.html" class="auth-link">← 返回登录</a>
      </div>
    </div>

    <a href="/" class="auth-back">← 返回首页</a>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/pages/forgot-password.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
