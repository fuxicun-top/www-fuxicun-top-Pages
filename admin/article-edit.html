<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>编辑文章 - 福溪村后台</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/admin/admin-layout.css">
  <link rel="stylesheet" href="/css/admin/admin-articles.css">
  <style>
    /* 文章编辑页面样式 */
    .editor-page { max-width: 1200px; }
    .editor-page__title { font-size: 24px; font-weight: 600; margin-bottom: 24px; color: var(--color-text-primary); }
    .editor-form { display: flex; flex-direction: column; gap: 20px; }
    .editor-form__row { display: flex; gap: 20px; }
    .editor-form__row .form-group { flex: 1; }
    .editor-form__actions { display: flex; gap: 12px; justify-content: flex-end; padding-top: 16px; border-top: 1px solid var(--color-border); }
    .cover-preview { max-width: 200px; max-height: 120px; border-radius: 4px; margin-top: 8px; object-fit: cover; }
    /* Markdown 编辑器样式 */
    .md-editor { border: 1px solid var(--color-border); border-radius: var(--radius-base); overflow: hidden; }
    .md-editor__toolbar { display: flex; gap: 2px; padding: 8px 12px; background: var(--color-bg-page); border-bottom: 1px solid var(--color-border); flex-wrap: wrap; }
    .md-toolbar-btn { width: 32px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; background: none; border-radius: 4px; cursor: pointer; font-size: 14px; color: var(--color-text-secondary); transition: background 0.15s; }
    .md-toolbar-btn:hover { background: var(--color-bg-hover); color: var(--color-text-primary); }
    .md-toolbar-sep { width: 1px; margin: 4px 6px; background: var(--color-border); }
    .md-editor__upload { position: relative; }
    .md-editor__upload input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .md-editor__body { display: flex; min-height: 400px; }
    .md-editor__input { flex: 1; border: none; outline: none; padding: 16px; font-size: 14px; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; line-height: 1.8; resize: vertical; min-height: 400px; }
    .md-editor__preview { flex: 1; padding: 16px; border-left: 1px solid var(--color-border); overflow-y: auto; max-height: 600px; background: #fff; font-size: 14px; line-height: 1.8; }
    .md-editor__preview h1, .md-editor__preview h2, .md-editor__preview h3 { margin: 16px 0 8px; }
    .md-editor__preview p { margin: 8px 0; }
    .md-editor__preview img { max-width: 100%; border-radius: 4px; }
    .md-editor__preview pre { background: #f5f5f5; padding: 12px; border-radius: 4px; overflow-x: auto; }
    .md-editor__preview blockquote { border-left: 3px solid var(--color-primary); padding-left: 12px; color: var(--color-text-secondary); }
    .md-editor__tabs { display: flex; border-bottom: 1px solid var(--color-border); background: var(--color-bg-page); }
    .md-editor__tab { padding: 8px 20px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--color-text-secondary); }
    .md-editor__tab--active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .md-preview-hidden { display: none !important; }
    .upload-progress { padding: 4px 12px; font-size: 12px; color: var(--color-primary); background: #e3f2fd; display: none; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>
    <div class="admin-main">
      <header class="admin-header" id="admin-header"></header>
      <main class="admin-content editor-page">
        <h1 class="editor-page__title" id="page-title">新建文章</h1>

        <div class="editor-form">
          <!-- 标题 -->
          <div class="form-group">
            <label class="form-label">文章标题 <span style="color:#c62828;">*</span></label>
            <input type="text" class="form-input" id="article-title" placeholder="请输入文章标题" maxlength="200">
          </div>

          <div class="editor-form__row">
            <!-- 分类 -->
            <div class="form-group">
              <label class="form-label">文章分类</label>
              <select class="form-input" id="article-category">
                <option value="">无分类</option>
              </select>
            </div>
            <!-- 状态 -->
            <div class="form-group">
              <label class="form-label">发布状态</label>
              <select class="form-input" id="article-status">
                <option value="published">已发布</option>
                <option value="draft">草稿</option>
              </select>
            </div>
            <!-- 精选推荐 -->
            <div class="form-group">
              <label class="form-label">精选推荐</label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;">
                <input type="checkbox" id="article-featured" style="width:18px;height:18px;cursor:pointer;">
                <span style="font-size:14px;color:var(--color-text-secondary);">设为精选（显示在首页精选推荐）</span>
              </label>
            </div>
          </div>

          <!-- 封面图 -->
          <div class="form-group">
            <label class="form-label">封面图片 URL</label>
            <input type="text" class="form-input" id="article-cover" placeholder="输入封面图片 URL" oninput="ArticleEdit.previewCover(this.value)">
            <img id="cover-preview" class="cover-preview" style="display:none;">
          </div>

          <!-- 摘要 -->
          <div class="form-group">
            <label class="form-label">文章摘要</label>
            <textarea class="form-input form-textarea" id="article-excerpt" rows="3" placeholder="简短描述文章内容（可选，不填则自动截取）" maxlength="500"></textarea>
          </div>

          <!-- Markdown 编辑器 -->
          <div class="form-group">
            <label class="form-label">文章内容 <span style="color:#c62828;">*</span></label>
            <div class="md-editor" id="md-editor">
              <!-- 工具栏 -->
              <div class="md-editor__toolbar">
                <button type="button" class="md-toolbar-btn" title="加粗" onclick="ArticleEdit.insertMd('**','**')"><b>B</b></button>
                <button type="button" class="md-toolbar-btn" title="斜体" onclick="ArticleEdit.insertMd('*','*')"><i>I</i></button>
                <button type="button" class="md-toolbar-btn" title="删除线" onclick="ArticleEdit.insertMd('~~','~~')"><s>S</s></button>
                <div class="md-toolbar-sep"></div>
                <button type="button" class="md-toolbar-btn" title="标题1" onclick="ArticleEdit.insertLine('# ')">H1</button>
                <button type="button" class="md-toolbar-btn" title="标题2" onclick="ArticleEdit.insertLine('## ')">H2</button>
                <button type="button" class="md-toolbar-btn" title="标题3" onclick="ArticleEdit.insertLine('### ')">H3</button>
                <div class="md-toolbar-sep"></div>
                <button type="button" class="md-toolbar-btn" title="无序列表" onclick="ArticleEdit.insertLine('- ')">&#8226;</button>
                <button type="button" class="md-toolbar-btn" title="有序列表" onclick="ArticleEdit.insertLine('1. ')">1.</button>
                <button type="button" class="md-toolbar-btn" title="引用" onclick="ArticleEdit.insertLine('> ')">&gt;</button>
                <button type="button" class="md-toolbar-btn" title="代码块" onclick="ArticleEdit.insertMd('```\n','\n```')">{ }</button>
                <button type="button" class="md-toolbar-btn" title="行内代码" onclick="ArticleEdit.insertMd('`','`')">&lt;&gt;</button>
                <div class="md-toolbar-sep"></div>
                <button type="button" class="md-toolbar-btn" title="链接" onclick="ArticleEdit.insertMd('[','](https://)')">🔗</button>
                <div class="md-editor__upload md-toolbar-btn" title="上传图片">
                  🖼️
                  <input type="file" accept="image/*" onchange="ArticleEdit.uploadImage(this.files[0])">
                </div>
                <div class="md-editor__upload md-toolbar-btn" title="上传视频">
                  🎬
                  <input type="file" accept="video/mp4,video/webm" onchange="ArticleEdit.uploadVideo(this.files[0])">
                </div>
                <div class="md-toolbar-sep"></div>
                <button type="button" class="md-toolbar-btn" title="分割线" onclick="ArticleEdit.insertLine('\n---\n')">—</button>
                <button type="button" class="md-toolbar-btn" title="表格" onclick="ArticleEdit.insertTable()">▦</button>
              </div>
              <!-- 上传进度 -->
              <div class="upload-progress" id="upload-progress"></div>
              <!-- 标签页切换 -->
              <div class="md-editor__tabs">
                <div class="md-editor__tab md-editor__tab--active" onclick="ArticleEdit.switchTab('edit')">编辑</div>
                <div class="md-editor__tab" onclick="ArticleEdit.switchTab('preview')">预览</div>
                <div class="md-editor__tab" onclick="ArticleEdit.splitView()">分屏</div>
              </div>
              <!-- 编辑区 + 预览区 -->
              <div class="md-editor__body">
                <textarea class="md-editor__input" id="md-input" placeholder="输入 Markdown 格式的文章内容...&#10;&#10;支持标准 Markdown 语法：&#10;# 标题&#10;**加粗** *斜体*&#10;- 列表&#10;> 引用&#10;```代码块```&#10;[链接](url) ![图片](url)"></textarea>
                <div class="md-editor__preview md-preview-hidden" id="md-preview"></div>
              </div>
            </div>
          </div>

          <!-- 操作按钮 -->
          <div class="editor-form__actions">
            <button class="btn btn-secondary" onclick="history.back()">取消</button>
            <button class="btn btn-primary" id="btn-save" onclick="ArticleEdit.save('draft')">保存草稿</button>
            <button class="btn btn-success" id="btn-publish" onclick="ArticleEdit.save('published')">发布文章</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/common/config.js?v=3"></script>
  <script src="/js/common/storage.js?v=3"></script>
  <script src="/js/common/utils.js?v=3"></script>
  <script src="/js/common/api.js?v=3"></script>
  <script src="/js/common/auth.js?v=3"></script>
  <script src="/js/common/toast.js?v=3"></script>
  <script src="/js/admin/admin.js?v=3"></script>
  <script src="/js/admin/article-edit.js?v=3"></script>
</body>
</html>
