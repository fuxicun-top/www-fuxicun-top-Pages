<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>网站设置 - 福溪村后台</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/admin/admin-layout.css">
  <link rel="stylesheet" href="/css/admin/admin-articles.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>
    <div class="admin-main">
      <header class="admin-header" id="admin-header"></header>
      <main class="admin-content">
        <div class="admin-toolbar">
          <div class="admin-toolbar__left">
            <h2 style="font-size:18px;font-weight:600;">网站设置</h2>
          </div>
          <div class="admin-toolbar__right">
            <button class="btn btn-primary" id="btn-save">保存设置</button>
          </div>
        </div>

        <div style="background:var(--color-bg-card);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm);">
          <form id="config-form">
            <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">基本信息</h3>
            <div class="form-group"><label class="form-label">网站名称</label><input type="text" name="site_name" class="form-input"></div>
            <div class="form-group"><label class="form-label">网站描述</label><textarea name="site_description" class="form-input form-textarea"></textarea></div>
            <div class="form-group"><label class="form-label">关键词</label><input type="text" name="site_keywords" class="form-input" placeholder="用逗号分隔"></div>

            <div class="divider"></div>
            <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">联系方式</h3>
            <div class="form-group"><label class="form-label">联系邮箱</label><input type="email" name="contact_email" class="form-input"></div>
            <div class="form-group"><label class="form-label">联系电话</label><input type="tel" name="contact_phone" class="form-input"></div>
            <div class="form-group"><label class="form-label">联系地址</label><input type="text" name="contact_address" class="form-input"></div>

            <div class="divider"></div>
            <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">其他</h3>
            <div class="form-group"><label class="form-label">ICP备案号</label><input type="text" name="icp_number" class="form-input" placeholder="如: 桂ICP备XXXXXXXX号"></div>
            <div class="form-group"><label class="form-label">版权信息</label><input type="text" name="copyright_text" class="form-input"></div>

            <div class="divider"></div>
            <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">主题颜色</h3>
            <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;">修改颜色后保存，网站主题色将实时更新。</p>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;">
              <div class="form-group">
                <label class="form-label">主色调</label>
                <div class="color-picker-row">
                  <input type="color" name="theme_primary_color" class="color-picker-input">
                  <input type="text" class="form-input color-picker-text" data-for="theme_primary_color" placeholder="#2d6a4f">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">主色调（浅色）</label>
                <div class="color-picker-row">
                  <input type="color" name="theme_primary_light" class="color-picker-input">
                  <input type="text" class="form-input color-picker-text" data-for="theme_primary_light" placeholder="#40916c">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">主色调背景</label>
                <div class="color-picker-row">
                  <input type="color" name="theme_primary_bg" class="color-picker-input">
                  <input type="text" class="form-input color-picker-text" data-for="theme_primary_bg" placeholder="#f0f7f4">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">辅助色</label>
                <div class="color-picker-row">
                  <input type="color" name="theme_secondary_color" class="color-picker-input">
                  <input type="text" class="form-input color-picker-text" data-for="theme_secondary_color" placeholder="#d4a373">
                </div>
              </div>
            </div>
            <div style="margin-top:12px;">
              <button type="button" class="btn btn-outline" id="btn-reset-colors" style="font-size:13px;">恢复默认颜色</button>
            </div>

            <div class="divider"></div>
            <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">特殊日期黑白模式</h3>
            <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;">设置纪念日日期，当天网站将自动切换为黑白色调（如清明节、国家公祭日等）。</p>
            <div class="form-group">
              <label class="form-label">纪念日日期列表</label>
              <div id="memorial-dates-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
              <div style="display:flex;gap:8px;align-items:center;">
                <input type="date" id="memorial-date-input" class="form-input" style="width:auto;">
                <button type="button" class="btn btn-outline" id="btn-add-memorial" style="font-size:13px;white-space:nowrap;">添加日期</button>
              </div>
              <input type="hidden" name="theme_memorial_dates" id="theme_memorial_dates">
            </div>
            <div class="form-group">
              <label class="form-label" style="display:flex;align-items:center;gap:8px;">
                <input type="checkbox" id="theme_memorial_mode" style="width:auto;">
                手动开启黑白模式（忽略日期，立即生效）
              </label>
            </div>
          </form>
        </div>

        <style>
          .color-picker-row { display:flex; gap:8px; align-items:center; }
          .color-picker-input { width:42px; height:36px; border:1px solid var(--color-border); border-radius:var(--radius-base); cursor:pointer; padding:2px; }
          .color-picker-text { flex:1; font-family:var(--font-family-mono); font-size:13px; }
          .memorial-tag { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--color-primary-bg); border:1px solid var(--color-border); border-radius:var(--radius-full); font-size:13px; }
          .memorial-tag__remove { cursor:pointer; color:var(--color-text-secondary); font-size:16px; line-height:1; }
          .memorial-tag__remove:hover { color:var(--color-danger); }
        </style>
      </main>
    </div>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js?v=2"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/admin/admin.js"></script>
  <script src="/js/admin/settings.js"></script>
</body>
</html>
