<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>用户管理 - 福溪村后台</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/components/modal.css">
  <link rel="stylesheet" href="/css/components/pagination.css">
  <link rel="stylesheet" href="/css/admin/admin-layout.css">
  <link rel="stylesheet" href="/css/admin/admin-articles.css">
  <style>
    /* 批量操作栏样式 */
    .batch-bar { display: none; align-items: center; gap: 12px; padding: 12px 16px; background: #e3f2fd; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .batch-bar__info { color: #1565c0; }
    .batch-bar__actions { display: flex; gap: 8px; }
    .row-checkbox { width: 16px; height: 16px; cursor: pointer; }
    #select-all { width: 16px; height: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>
    <div class="admin-main">
      <header class="admin-header" id="admin-header"></header>
      <main class="admin-content">
        <div class="admin-toolbar">
          <div class="admin-toolbar__left">
            <div class="search-input">
              <input type="text" id="search-keyword" placeholder="搜索用户名/手机号...">
            </div>
            <select class="filter-select" id="filter-role">
              <option value="">全部角色</option>
              <option value="admin">管理员</option>
              <option value="editor">编辑者</option>
              <option value="user">普通用户</option>
            </select>
          </div>
        </div>

        <!-- 批量操作栏 -->
        <div class="batch-bar" id="batch-bar">
          <span class="batch-bar__info">已选中 <strong id="batch-count">0</strong> 个用户</span>
          <div class="batch-bar__actions">
            <button class="btn btn-sm btn-success" id="batch-enable">批量启用</button>
            <button class="btn btn-sm btn-warning" id="batch-disable">批量禁用</button>
            <button class="btn btn-sm btn-danger" id="batch-delete">批量删除</button>
          </div>
        </div>

        <div class="data-table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th><input type="checkbox" id="select-all" title="全选/取消全选"></th>
                <th>ID</th>
                <th>用户名</th>
                <th>手机号</th>
                <th>角色</th>
                <th>状态</th>
                <th>注册时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--color-text-placeholder);">加载中...</td></tr>
            </tbody>
          </table>
          <div class="table-pagination">
            <span class="table-pagination__info" id="pagination-info"></span>
            <div id="pagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js?v=2"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/pagination.js"></script>
  <script src="/js/admin/admin.js"></script>
  <script src="/js/admin/users.js"></script>
</body>
</html>
