<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>首页配置 - 福溪村后台</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/admin/admin-layout.css">
  <style>
    .config-section { margin-bottom: 32px; }
    .config-section__title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--color-primary); }
    .config-section__desc { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 16px; }
    .position-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .position-row label { min-width: 60px; font-weight: 500; font-size: 14px; }
    .position-row select { flex: 1; }
    .save-bar { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--color-border-light); }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>
    <div class="admin-main">
      <header class="admin-header" id="admin-header"></header>
      <main class="admin-content">
        <div class="admin-toolbar">
          <div class="admin-toolbar__left">
            <h2 style="font-size:18px;font-weight:600;">首页配置</h2>
          </div>
        </div>

        <div style="max-width:700px;">
          <!-- 精选推荐配置 -->
          <div class="config-section">
            <h3 class="config-section__title">精选推荐（最多 5 篇）</h3>
            <p class="config-section__desc">为每个位置选择文章，或设为"自动"按点赞量排行显示。自定义文章优先于自动排行。</p>
            <div id="featured-positions"></div>
          </div>

          <!-- 新闻动态配置 -->
          <div class="config-section">
            <h3 class="config-section__title">新闻动态（最多 4 篇）</h3>
            <p class="config-section__desc">为每个位置选择文章，或设为"自动"按最新发布时间显示。自定义文章优先于自动排行。</p>
            <div id="news-positions"></div>
          </div>

          <div class="save-bar">
            <button class="btn btn-primary" onclick="HomepageConfig.save()">保存配置</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js?v=2"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/admin/admin.js"></script>
  <script src="/js/admin/homepage.js"></script>
</body>
</html>
