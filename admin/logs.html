<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>操作日志 - 福溪村后台</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/components/pagination.css">
  <link rel="stylesheet" href="/css/admin/admin-layout.css">
  <style>
    /* 操作日志页面样式 */
    .log-action-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .log-action-tag--create { background: #e8f5e9; color: #2e7d32; }
    .log-action-tag--update { background: #e3f2fd; color: #1565c0; }
    .log-action-tag--delete { background: #ffebee; color: #c62828; }
    .log-action-tag--status { background: #fff3e0; color: #e65100; }
    .log-detail-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>
    <div class="admin-main">
      <header class="admin-header" id="admin-header"></header>
      <main class="admin-content">
        <!-- 工具栏：操作类型筛选 -->
        <div class="admin-toolbar">
          <div class="admin-toolbar__left">
            <select class="filter-select" id="filter-action">
              <option value="">全部操作</option>
              <option value="article_create">创建文章</option>
              <option value="article_update">更新文章</option>
              <option value="article_delete">删除文章</option>
              <option value="article_status_change">文章状态变更</option>
              <option value="comment_status_change">评论审核</option>
              <option value="comment_delete">删除评论</option>
              <option value="media_delete">删除媒体</option>
              <option value="user_delete">删除用户</option>
            </select>
          </div>
        </div>

        <!-- 日志数据表格 -->
        <div class="data-table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>操作类型</th>
                <th>操作人</th>
                <th>目标类型</th>
                <th>目标ID</th>
                <th>详情</th>
                <th>操作时间</th>
              </tr>
            </thead>
            <tbody id="logs-tbody">
              <tr><td colspan="7" style="text-align:center;padding:40px;">加载中...</td></tr>
            </tbody>
          </table>
          <div class="table-pagination">
            <span class="table-pagination__info" id="pagination-info"></span>
            <div id="pagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js?v=2"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/components/pagination.js"></script>
  <script src="/js/admin/admin.js"></script>
  <script src="/js/admin/logs.js"></script>
</body>
</html>
