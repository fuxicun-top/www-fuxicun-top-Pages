<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="福溪村新闻动态 - 村务公告、活动资讯、媒体报道">
  <meta name="keywords" content="福溪村,新闻,动态,公告,活动">
  <title>新闻动态 - 福溪村</title>

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/common/animations.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/components/card.css">
  <link rel="stylesheet" href="/css/components/pagination.css">
  <link rel="stylesheet" href="/css/components/breadcrumb.css">
  <link rel="stylesheet" href="/css/pages/news.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="main-content">
    <div class="container">
      <!-- 面包屑 -->
      <nav class="breadcrumb">
        <a href="/">首页</a>
        <span class="breadcrumb__sep">/</span>
        <span class="breadcrumb__current">新闻动态</span>
      </nav>

      <!-- 页面标题 -->
      <div class="news-header">
        <h1 class="news-header__title">新闻动态</h1>
        <div class="news-header__sort">
          <button class="news-sort-btn active" data-sort="latest" onclick="NewsPage.changeSort('latest')">最新发布</button>
          <button class="news-sort-btn" data-sort="views" onclick="NewsPage.changeSort('views')">最多浏览</button>
        </div>
      </div>

      <!-- 新闻列表 -->
      <div class="news-list" id="news-list">
        <div class="skeleton" style="height:170px;border-radius:var(--radius-lg);"></div>
        <div class="skeleton" style="height:170px;border-radius:var(--radius-lg);"></div>
        <div class="skeleton" style="height:170px;border-radius:var(--radius-lg);"></div>
      </div>

      <!-- 分页 -->
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/header.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/components/pagination.js"></script>
  <script src="/js/pages/news.js"></script>
</body>
</html>
