<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>个人中心 - 福溪村</title>

  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/user-center.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="main-content">
    <div class="container">
      <div class="user-layout">
        <aside class="user-sidebar">
          <div class="user-sidebar__avatar">
            <div class="avatar-circle" id="user-avatar">U</div>
            <h3 class="user-sidebar__name" id="user-name">加载中...</h3>
            <label for="avatar-file" class="btn btn-outline btn-sm" style="margin-top:12px;cursor:pointer;">更换头像</label>
            <input type="file" id="avatar-file" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
            <p style="font-size:12px;color:var(--color-text-placeholder);margin-top:8px;">支持 JPG/PNG/WebP/GIF，≤2MB</p>
          </div>
          <nav class="user-sidebar__nav">
            <a href="/user/profile.html" class="user-nav-item active">个人资料</a>
            <a href="/user/articles.html" class="user-nav-item">我的文章</a>
            <a href="/user/publish.html" class="user-nav-item">发表文章</a>
          </nav>
        </aside>

        <div class="user-main">
          <h2 class="user-main__title">个人资料</h2>

          <div class="user-card">
            <form id="profile-form">
              <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" name="phone" class="form-input" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" name="email" class="form-input">
              </div>
              <button type="submit" class="btn btn-primary" id="btn-save-profile">保存修改</button>
            </form>
          </div>

          <h2 class="user-main__title" style="margin-top:32px;">修改密码</h2>
          <div class="user-card">
            <form id="password-form">
              <div class="form-group">
                <label class="form-label">当前密码</label>
                <input type="password" name="old_password" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">新密码</label>
                <input type="password" name="new_password" class="form-input" required minlength="6">
              </div>
              <div class="form-group">
                <label class="form-label">确认新密码</label>
                <input type="password" name="confirm_password" class="form-input" required>
              </div>
              <button type="submit" class="btn btn-primary" id="btn-change-password">修改密码</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/header.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/pages/user-profile.js"></script>
</body>
</html>
