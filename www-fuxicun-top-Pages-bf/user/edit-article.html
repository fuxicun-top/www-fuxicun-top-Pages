<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>编辑文章 - 福溪村</title>

  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/user-center.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="main-content">
    <div class="container">
      <div class="user-layout">
        <aside class="user-sidebar">
          <div class="user-sidebar__avatar">
            <div class="avatar-circle" id="user-avatar">U</div>
            <h3 class="user-sidebar__name" id="user-name">加载中...</h3>
          </div>
          <nav class="user-sidebar__nav">
            <a href="/user/profile.html" class="user-nav-item">个人资料</a>
            <a href="/user/articles.html" class="user-nav-item">我的文章</a>
            <a href="/user/publish.html" class="user-nav-item">发表文章</a>
          </nav>
        </aside>

        <div class="user-main">
          <h2 class="user-main__title">编辑文章</h2>

          <div class="user-card publish-form">
            <form id="edit-form">
              <input type="hidden" id="article-id" value="">

              <div class="form-group">
                <label class="form-label">文章标题 <span class="required">*</span></label>
                <input type="text" name="title" class="form-input" required maxlength="200" placeholder="请输入文章标题">
              </div>

              <div class="form-group">
                <label class="form-label">文章分类</label>
                <select name="category_id" class="form-input" id="category-select">
                  <option value="">请选择分类</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">封面图片</label>
                <div class="cover-upload">
                  <input type="hidden" name="cover_image" id="cover-image-input">
                  <div class="cover-preview" id="cover-preview" style="display:none;">
                    <img id="cover-preview-img" src="" alt="">
                    <button type="button" class="btn btn-sm btn-danger" onclick="removeCover()">移除</button>
                  </div>
                  <div class="cover-upload-btn" id="cover-upload-btn">
                    <input type="file" id="cover-file" accept="image/jpeg,image/png,image/webp" style="display:none;">
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('cover-file').click()">选择图片</button>
                    <p class="cover-upload-tip">支持 JPG、PNG、WebP，最大 5MB</p>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">文章摘要</label>
                <textarea name="summary" class="form-input form-textarea" rows="3" maxlength="500" placeholder="简短描述文章内容（可选）"></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">文章内容 <span class="required">*</span></label>
                <textarea name="content" class="form-input form-textarea publish-content" required placeholder="请输入文章内容，支持 HTML 格式"></textarea>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="btn-save">保存修改</button>
                <a href="/user/articles.html" class="btn btn-outline">取消</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/header.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/pages/user-edit-article.js"></script>
</body>
</html>
