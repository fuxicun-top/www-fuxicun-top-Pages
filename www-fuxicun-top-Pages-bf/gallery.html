<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="福溪村图片画廊 - 古村风貌、民俗文化、自然风光">
  <meta name="keywords" content="福溪村,图片,画廊,古村,风光">
  <title>图片画廊 - 福溪村</title>

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/common/animations.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/components/pagination.css">
  <link rel="stylesheet" href="/css/components/breadcrumb.css">
  <link rel="stylesheet" href="/css/pages/gallery.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="main-content">
    <div class="container">
      <!-- 面包屑 -->
      <nav class="breadcrumb">
        <a href="/">首页</a>
        <span class="breadcrumb__sep">/</span>
        <span class="breadcrumb__current">图片画廊</span>
      </nav>

      <!-- 页面标题 -->
      <div class="gallery-page__header">
        <h1 class="gallery-page__title">图片画廊</h1>
        <p class="gallery-page__subtitle">福溪村的古村风貌、民俗文化与自然风光</p>
      </div>

      <!-- 瀑布流画廊 -->
      <div class="gallery-masonry" id="gallery-list">
        <div class="skeleton" style="height:240px;border-radius:var(--radius-lg);"></div>
        <div class="skeleton" style="height:300px;border-radius:var(--radius-lg);"></div>
        <div class="skeleton" style="height:200px;border-radius:var(--radius-lg);"></div>
        <div class="skeleton" style="height:260px;border-radius:var(--radius-lg);"></div>
      </div>

      <!-- 加载更多 -->
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" onclick="GalleryPage.closeLightbox()">&times;</button>
    <button class="lightbox__nav lightbox__nav--prev" onclick="GalleryPage.prevImage()">&#8249;</button>
    <img class="lightbox__image" id="lightbox-image" src="" alt="">
    <button class="lightbox__nav lightbox__nav--next" onclick="GalleryPage.nextImage()">&#8250;</button>
    <div class="lightbox__info" id="lightbox-info"></div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/header.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/components/pagination.js"></script>
  <script src="/js/pages/gallery.js"></script>
</body>
</html>
