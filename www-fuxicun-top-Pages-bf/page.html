<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面 - 福溪村</title>

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/common/animations.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/components/breadcrumb.css">
  <link rel="stylesheet" href="/css/pages/content-page.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="main-content">
    <div class="page-banner" id="page-banner">
      <div class="container">
        <h1 class="page-banner__title" id="page-title">加载中...</h1>
      </div>
    </div>

    <div class="container">
      <nav class="breadcrumb">
        <a href="/">首页</a>
        <span class="breadcrumb__sep">/</span>
        <span class="breadcrumb__current" id="breadcrumb-title">页面</span>
      </nav>
    </div>

    <section class="content-section">
      <div class="container" style="max-width:900px;">
        <div id="page-content">
          <div class="skeleton" style="height:200px;border-radius:var(--radius-lg);"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/header.js"></script>
  <script src="/js/components/footer.js"></script>
  <script>
    (function() {
      'use strict';

      function init() {
        var path = window.location.pathname;
        // /p/slug 格式
        var match = path.match(/^\/p\/([^\/]+)$/);
        if (!match) {
          document.getElementById('page-content').innerHTML = '<div class="empty-state">页面地址无效</div>';
          return;
        }

        var slug = match[1];
        loadPage(slug);
      }

      async function loadPage(slug) {
        try {
          var result = await API.get('/pages/' + slug);
          if (result.success) {
            var page = result.data;
            document.title = page.title + ' - 福溪村';
            document.getElementById('page-title').textContent = page.title;
            document.getElementById('breadcrumb-title').textContent = page.title;
            document.getElementById('page-content').innerHTML = renderContent(page.content || '暂无内容');
          } else {
            document.getElementById('page-title').textContent = '页面不存在';
            document.getElementById('page-content').innerHTML = '<div class="empty-state">该页面不存在或已删除</div>';
          }
        } catch (e) {
          document.getElementById('page-content').innerHTML = '<div class="empty-state">加载失败</div>';
        }
      }

      function renderContent(md) {
        if (!md) return '<p style="color:#999;">暂无内容</p>';
        // 如果内容包含 HTML 标签，直接渲染
        if (/<[a-z][\s\S]*>/i.test(md)) return md;
        // 简易 Markdown 渲染
        var html = md
          .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
          .replace(/^### (.+)$/gm, '<h3>$1</h3>')
          .replace(/^## (.+)$/gm, '<h2>$1</h2>')
          .replace(/^# (.+)$/gm, '<h1>$1</h1>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:4px;">')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--color-primary);">$1</a>')
          .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
          .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #ddd;margin:16px 0;">')
          .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
          .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
          .replace(/\n\n/g, '</p><p>')
          .replace(/\n/g, '<br>');
        return '<p>' + html + '</p>';
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
