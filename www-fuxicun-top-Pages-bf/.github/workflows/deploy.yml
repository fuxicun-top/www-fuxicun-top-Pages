# ========================================
# 福溪村官网 - GitHub Actions 部署工作流
# 功能：推送代码到 main 分支时自动部署到 Cloudflare Pages
# 触发：push 到 main 分支 或 手动触发
# ========================================

name: 部署到 Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 部署
    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 部署到 Cloudflare Pages（使用 Wrangler CLI）
      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=fuxicun-website

      # 部署成功通知
      - name: 部署完成
        run: echo "✅ 部署成功！访问 https://fuxicun.top 查看"
