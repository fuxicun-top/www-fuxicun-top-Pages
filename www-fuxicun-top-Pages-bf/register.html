<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="注册福溪村官网账号，参与村务交流">
  <title>注册 - 福溪村</title>

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/login.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-logo">福溪村</h1>
        <p class="auth-subtitle">用户注册</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" name="username" class="form-input" placeholder="请输入用户名（2-20个字符）" autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label">手机号</label>
          <input type="tel" name="phone" class="form-input" placeholder="请输入手机号" autocomplete="tel">
        </div>

        <div class="form-group">
          <label class="form-label">邮箱（选填）</label>
          <input type="email" name="email" class="form-input" placeholder="请输入邮箱" autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" name="password" class="form-input" placeholder="请输入密码（不少于8位）" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-label">确认密码</label>
          <input type="password" name="passwordConfirm" class="form-input" placeholder="请再次输入密码" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-check">
            <input type="checkbox" name="agree">
            <span>我已阅读并同意<a href="/terms.html" target="_blank">用户协议</a>和<a href="/privacy.html" target="_blank">隐私政策</a></span>
          </label>
        </div>

        <div class="turnstile-container" id="turnstile-container"></div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-register">注册</button>
      </form>

      <div class="auth-footer">
        已有账号？<a href="/login.html" class="auth-link">立即登录</a>
      </div>
    </div>

    <a href="/" class="auth-back">&larr; 返回首页</a>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/pages/register.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
