<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#vbg)"/>
  <!-- 播放器边框 -->
  <rect x="60" y="40" width="280" height="180" rx="8" fill="#0f3460" stroke="#52b788" stroke-width="1" opacity="0.6"/>
  <!-- 播放按钮 -->
  <circle cx="200" cy="130" r="35" fill="#52b788" opacity="0.8"/>
  <polygon points="190,110 190,150 220,130" fill="white"/>
  <!-- 进度条 -->
  <rect x="80" y="235" width="240" height="4" rx="2" fill="#333"/>
  <rect x="80" y="235" width="80" height="4" rx="2" fill="#52b788"/>
  <circle cx="160" cy="237" r="6" fill="#52b788"/>
  <!-- 时间 -->
  <text x="80" y="260" font-family="monospace" font-size="11" fill="#adb5bd">01:23</text>
  <text x="280" y="260" font-family="monospace" font-size="11" fill="#adb5bd">03:45</text>
  <!-- 控制按钮 -->
  <circle cx="180" cy="257" r="8" fill="none" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="180" y="261" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#adb5bd">▶</text>
  <text x="220" y="261" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#adb5bd">🔊</text>
  <text x="200" y="285" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="14" fill="#52b788" opacity="0.7">福溪村 · 视频</text>
</svg>