<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="c3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ede5d5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#c3bg)"/>
  <!-- 书院场景 -->
  <!-- 桌案 -->
  <rect x="80" y="180" width="240" height="12" fill="#8B7355" rx="2"/>
  <rect x="90" y="192" width="8" height="40" fill="#6B5B4F"/>
  <rect x="302" y="192" width="8" height="40" fill="#6B5B4F"/>
  <!-- 书卷 -->
  <rect x="120" y="160" width="80" height="20" rx="2" fill="#FFF8DC" stroke="#d4a373" stroke-width="0.5"/>
  <line x1="130" y1="165" x2="190" y2="165" stroke="#8B7355" stroke-width="0.5"/>
  <line x1="130" y1="170" x2="185" y2="170" stroke="#8B7355" stroke-width="0.5"/>
  <line x1="130" y1="175" x2="180" y2="175" stroke="#8B7355" stroke-width="0.5"/>
  <!-- 笔架和毛笔 -->
  <path d="M230 160 L240 148 L250 160" stroke="#8B7355" stroke-width="2" fill="none"/>
  <line x1="240" y1="130" x2="240" y2="148" stroke="#5C4033" stroke-width="2"/>
  <circle cx="240" cy="128" r="2" fill="#333"/>
  <!-- 墨砚 -->
  <ellipse cx="280" cy="172" rx="18" ry="8" fill="#333"/>
  <ellipse cx="280" cy="172" rx="15" ry="6" fill="#555"/>
  <!-- 书架 -->
  <rect x="40" y="50" width="80" height="130" fill="#6B5B4F" rx="2"/>
  <rect x="45" y="55" width="70" height="5" fill="#8B7355"/>
  <rect x="45" y="75" width="70" height="5" fill="#8B7355"/>
  <rect x="45" y="95" width="70" height="5" fill="#8B7355"/>
  <rect x="45" y="115" width="70" height="5" fill="#8B7355"/>
  <rect x="45" y="135" width="70" height="5" fill="#8B7355"/>
  <!-- 书籍 -->
  <rect x="48" y="58" width="8" height="17" fill="#C0392B"/>
  <rect x="58" y="58" width="6" height="17" fill="#2d6a4f"/>
  <rect x="66" y="58" width="10" height="17" fill="#5C4033"/>
  <rect x="48" y="78" width="10" height="17" fill="#2d6a4f"/>
  <rect x="60" y="78" width="7" height="17" fill="#8B7355"/>
  <rect x="69" y="78" width="8" height="17" fill="#C0392B"/>
  <rect x="48" y="98" width="12" height="17" fill="#5C4033"/>
  <rect x="62" y="98" width="8" height="17" fill="#2d6a4f"/>
  <rect x="48" y="118" width="6" height="17" fill="#C0392B"/>
  <rect x="56" y="118" width="10" height="17" fill="#8B7355"/>
  <!-- 学子 -->
  <g transform="translate(200,110)">
    <!-- 身体 -->
    <ellipse cx="0" cy="50" rx="25" ry="30" fill="#4a7c59" opacity="0.7"/>
    <!-- 头 -->
    <circle cx="0" cy="20" r="16" fill="#F5D0A9"/>
    <!-- 发髻 -->
    <ellipse cx="0" cy="8" rx="12" ry="6" fill="#333"/>
    <circle cx="0" cy="4" r="4" fill="#333"/>
    <!-- 五官 -->
    <circle cx="-5" cy="18" r="1.5" fill="#333"/>
    <circle cx="5" cy="18" r="1.5" fill="#333"/>
    <path d="M-3 24 Q0 27 3 24" stroke="#5C4033" stroke-width="0.8" fill="none"/>
  </g>
  <!-- 挂轴书法 -->
  <rect x="280" y="40" width="50" height="80" fill="#FFF8DC" stroke="#d4a373" stroke-width="1" rx="1"/>
  <line x1="295" y1="55" x2="315" y2="55" stroke="#2d6a4f" stroke-width="1" opacity="0.5"/>
  <line x1="295" y1="65" x2="312" y2="65" stroke="#2d6a4f" stroke-width="1" opacity="0.5"/>
  <line x1="295" y1="75" x2="310" y2="75" stroke="#2d6a4f" stroke-width="1" opacity="0.5"/>
  <line x1="295" y1="85" x2="308" y2="85" stroke="#2d6a4f" stroke-width="1" opacity="0.5"/>
  <text x="200" y="270" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="12" fill="#5C4033" opacity="0.7">理学传承 · 书院讲学</text>
</svg>