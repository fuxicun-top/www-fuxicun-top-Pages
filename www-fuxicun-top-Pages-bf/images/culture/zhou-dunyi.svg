<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="c1bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#c1bg)"/>
  <!-- 书卷背景 -->
  <rect x="40" y="30" width="320" height="240" rx="6" fill="#fffef5" stroke="#d4a373" stroke-width="1.5"/>
  <rect x="55" y="45" width="290" height="210" rx="3" fill="#fffdf0"/>
  <!-- 周敦颐像 -->
  <circle cx="130" cy="100" r="35" fill="#e8e0d0"/>
  <circle cx="130" cy="100" r="33" fill="#f5f0e8"/>
  <!-- 人物轮廓 -->
  <ellipse cx="130" cy="88" r="16" fill="#d4a373" opacity="0.4"/>
  <path d="M114 88 Q130 75 146 88" fill="#8B7355" opacity="0.5"/>
  <rect x="118" y="100" width="24" height="30" fill="#2d6a4f" opacity="0.4" rx="2"/>
  <!-- 文字 -->
  <text x="250" y="80" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="22" fill="#2d6a4f" font-weight="bold">周敦颐</text>
  <text x="250" y="105" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="12" fill="#8B7355">1017-1073 · 宋代理学鼻祖</text>
  <!-- 《爱莲说》片段 -->
  <line x1="80" y1="130" x2="320" y2="130" stroke="#d4a373" stroke-width="0.5" opacity="0.5"/>
  <text x="200" y="155" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="14" fill="#5C4033">水陆草木之花，可爱者甚蕃。</text>
  <text x="200" y="178" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="14" fill="#5C4033">晋陶渊明独爱菊。</text>
  <text x="200" y="201" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="16" fill="#2d6a4f" font-weight="bold">自李唐来，世人甚爱牡丹。</text>
  <text x="200" y="224" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="16" fill="#C0392B" font-weight="bold">予独爱莲之出淤泥而不染</text>
  <!-- 莲花装饰 -->
  <g transform="translate(340,260)" opacity="0.3">
    <ellipse cx="0" cy="-8" rx="6" ry="10" fill="#FFB6C1" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="10" fill="#FF69B4" transform="rotate(60)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="10" fill="#FFB6C1" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
</svg>