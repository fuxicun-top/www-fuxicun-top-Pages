<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lotusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52b788;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6a4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#40916c;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#52b788;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40916c;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8f3dc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#2d6a4f" stroke-width="2"/>

  <!-- 莲花花瓣 - 外层 -->
  <g transform="translate(100,78)">
    <!-- 左外瓣 -->
    <path d="M0,-8 C-28,-30 -42,-8 -30,12 C-22,24 -8,18 0,8Z" fill="url(#lotusGrad)" opacity="0.7"/>
    <!-- 右外瓣 -->
    <path d="M0,-8 C28,-30 42,-8 30,12 C22,24 8,18 0,8Z" fill="url(#lotusGrad)" opacity="0.7"/>
    <!-- 左中瓣 -->
    <path d="M0,-6 C-20,-28 -34,-6 -24,10 C-18,20 -6,16 0,6Z" fill="url(#lotusGrad)" opacity="0.85"/>
    <!-- 右中瓣 -->
    <path d="M0,-6 C20,-28 34,-6 24,10 C18,20 6,16 0,6Z" fill="url(#lotusGrad)" opacity="0.85"/>
    <!-- 中心瓣 -->
    <path d="M0,-4 C-12,-24 -20,-4 -14,8 C-10,16 -4,12 0,4Z" fill="#2d6a4f"/>
    <path d="M0,-4 C12,-24 20,-4 14,8 C10,16 4,12 0,4Z" fill="#2d6a4f"/>
    <!-- 莲蓬 -->
    <ellipse cx="0" cy="2" rx="6" ry="5" fill="#1b4332"/>
    <circle cx="-2" cy="1" r="1.2" fill="#52b788"/>
    <circle cx="2" cy="1" r="1.2" fill="#52b788"/>
    <circle cx="0" cy="3.5" r="1.2" fill="#52b788"/>
  </g>

  <!-- 莲叶 -->
  <g transform="translate(100,105)">
    <ellipse cx="-22" cy="0" rx="20" ry="8" fill="#40916c" opacity="0.6" transform="rotate(-15)"/>
    <ellipse cx="22" cy="0" rx="20" ry="8" fill="#40916c" opacity="0.6" transform="rotate(15)"/>
    <ellipse cx="0" cy="4" rx="16" ry="6" fill="#52b788" opacity="0.5"/>
  </g>

  <!-- 溪流水纹 -->
  <g transform="translate(100,125)">
    <path d="M-50,0 C-40,-6 -25,6 -15,0 C-5,-6 10,6 20,0 C30,-6 45,6 50,0" fill="none" stroke="url(#waterGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-45,8 C-35,2 -20,14 -10,8 C0,2 15,14 25,8 C35,2 48,14 52,8" fill="none" stroke="url(#waterGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- 古建筑剪影 -->
  <g transform="translate(100,108)" opacity="0.15">
    <!-- 屋顶 -->
    <path d="M-18,8 L-22,2 L-14,-2 L-10,2 L-8,0 L0,-6 L8,0 L10,2 L14,-2 L22,2 L18,8Z" fill="#1b4332"/>
    <!-- 柱子 -->
    <rect x="-16" y="8" width="3" height="10" fill="#1b4332"/>
    <rect x="13" y="8" width="3" height="10" fill="#1b4332"/>
  </g>

  <!-- 文字：福溪村 -->
  <text x="100" y="165" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, STKaiti, serif" font-size="28" font-weight="700" fill="#2d6a4f" letter-spacing="6">福溪村</text>

  <!-- 副标题 -->
  <text x="100" y="182" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="9" fill="#40916c" letter-spacing="2">千年古村 · 理学圣地</text>
</svg>
