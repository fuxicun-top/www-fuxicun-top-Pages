<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="sky3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="40%" style="stop-color:#FFECB3"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4DB6AC;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#80CBC4;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#4DB6AC;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="100%" style="stop-color:#6D4C41"/>
    </linearGradient>
    <linearGradient id="roof3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#546E7A"/>
      <stop offset="100%" style="stop-color:#37474F"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="600" fill="url(#sky3)"/>
  <!-- 远山 -->
  <path d="M0,250 L350,180 L700,230 L1050,170 L1400,220 L1750,180 L1920,210 L1920,600 L0,600Z" fill="#2d6a4f" opacity="0.2"/>
  <path d="M0,300 L400,240 L800,280 L1200,230 L1600,270 L1920,250 L1920,600 L0,600Z" fill="#40916c" opacity="0.25"/>
  <!-- 河岸 -->
  <path d="M0,420 Q480,380 960,400 Q1440,420 1920,390 L1920,600 L0,600Z" fill="#8D6E63" opacity="0.2"/>
  <!-- 溪流 -->
  <path d="M0,450 Q200,430 400,445 Q600,460 800,440 Q1000,420 1200,445 Q1400,470 1600,440 Q1800,410 1920,430 L1920,520 Q1800,500 1600,520 Q1400,540 1200,510 Q1000,480 800,510 Q600,540 400,510 Q200,480 0,500Z" fill="url(#stream)"/>
  <!-- 水波纹 -->
  <g opacity="0.15">
    <path d="M100,460 Q150,455 200,460 Q250,465 300,460" fill="none" stroke="#4DB6AC" stroke-width="1.5"/>
    <path d="M500,450 Q550,445 600,450 Q650,455 700,450" fill="none" stroke="#4DB6AC" stroke-width="1.5"/>
    <path d="M900,440 Q950,435 1000,440 Q1050,445 1100,440" fill="none" stroke="#4DB6AC" stroke-width="1.5"/>
    <path d="M1300,455 Q1350,450 1400,455 Q1450,460 1500,455" fill="none" stroke="#4DB6AC" stroke-width="1.5"/>
  </g>
  <!-- 风雨桥 -->
  <g transform="translate(960,380)">
    <!-- 桥拱 -->
    <path d="M-120,30 Q-120,-10 0,-20 Q120,-10 120,30" fill="url(#bridge)" opacity="0.8"/>
    <!-- 桥面 -->
    <rect x="-130" y="25" width="260" height="12" fill="#6D4C41" rx="2"/>
    <!-- 桥廊 -->
    <polygon points="0,-35 -110,-10 -95,-14 -80,-8 -65,-18 -50,-8 -35,-14 0,-20 35,-14 50,-8 65,-18 80,-8 95,-14 110,-10 0,-35" fill="url(#roof3)" opacity="0.85"/>
    <!-- 桥柱 -->
    <rect x="-90" y="-10" width="4" height="38" fill="#5D4037" opacity="0.7"/>
    <rect x="-45" y="-16" width="4" height="44" fill="#5D4037" opacity="0.7"/>
    <rect x="41" y="-16" width="4" height="44" fill="#5D4037" opacity="0.7"/>
    <rect x="86" y="-10" width="4" height="38" fill="#5D4037" opacity="0.7"/>
    <!-- 桥栏 -->
    <rect x="-100" y="15" width="200" height="3" fill="#5D4037" opacity="0.5"/>
  </g>
  <!-- 左岸古建筑 -->
  <g transform="translate(350,330)">
    <polygon points="0,55 -65,12 -52,8 -40,14 -28,0 -14,14 0,8 14,14 28,0 40,14 52,8 65,12 0,55" fill="url(#roof3)" opacity="0.75"/>
    <rect x="-50" y="55" width="100" height="42" fill="#EFEBE9" opacity="0.75"/>
    <rect x="-38" y="66" width="16" height="20" fill="#5D4037" rx="2" opacity="0.6"/>
    <rect x="-8" y="66" width="16" height="20" fill="#5D4037" rx="2" opacity="0.6"/>
    <rect x="22" y="66" width="16" height="20" fill="#5D4037" rx="2" opacity="0.6"/>
  </g>
  <g transform="translate(180,350)">
    <polygon points="0,45 -50,10 -40,6 -30,12 -20,0 -10,12 0,6 10,12 20,0 30,12 40,6 50,10 0,45" fill="url(#roof3)" opacity="0.6"/>
    <rect x="-38" y="45" width="76" height="35" fill="#EFEBE9" opacity="0.6"/>
  </g>
  <!-- 右岸古建筑 -->
  <g transform="translate(1550,325)">
    <polygon points="0,60 -70,14 -58,10 -45,16 -32,0 -16,16 0,10 16,16 32,0 45,16 58,10 70,14 0,60" fill="url(#roof3)" opacity="0.8"/>
    <rect x="-55" y="60" width="110" height="45" fill="#EFEBE9" opacity="0.8"/>
    <rect x="-42" y="72" width="18" height="22" fill="#5D4037" rx="2" opacity="0.7"/>
    <rect x="-10" y="72" width="18" height="22" fill="#5D4037" rx="2" opacity="0.7"/>
    <rect x="22" y="72" width="18" height="22" fill="#5D4037" rx="2" opacity="0.7"/>
  </g>
  <g transform="translate(1750,345)">
    <polygon points="0,48 -55,10 -45,7 -35,13 -22,0 -10,13 0,7 10,13 22,0 35,13 45,7 55,10 0,48" fill="url(#roof3)" opacity="0.65"/>
    <rect x="-42" y="48" width="84" height="38" fill="#EFEBE9" opacity="0.65"/>
  </g>
  <!-- 古树 -->
  <g transform="translate(600,340)">
    <rect x="-10" y="0" width="20" height="65" fill="#5D4037" opacity="0.6"/>
    <ellipse cx="0" cy="-25" rx="55" ry="45" fill="#2E7D32" opacity="0.45"/>
    <ellipse cx="-25" cy="-15" rx="35" ry="30" fill="#388E3C" opacity="0.4"/>
    <ellipse cx="25" cy="-20" rx="32" ry="28" fill="#43A047" opacity="0.35"/>
  </g>
  <g transform="translate(1350,335)">
    <rect x="-9" y="0" width="18" height="60" fill="#5D4037" opacity="0.6"/>
    <ellipse cx="0" cy="-22" rx="50" ry="42" fill="#2E7D32" opacity="0.45"/>
    <ellipse cx="-20" cy="-12" rx="32" ry="28" fill="#388E3C" opacity="0.4"/>
  </g>
  <!-- 小石阶 -->
  <g opacity="0.3">
    <rect x="780" y="420" width="30" height="6" fill="#9E9E9E" rx="1"/>
    <rect x="770" y="428" width="35" height="6" fill="#9E9E9E" rx="1"/>
    <rect x="760" y="436" width="40" height="6" fill="#9E9E9E" rx="1"/>
  </g>
  <!-- 云 -->
  <g opacity="0.2">
    <ellipse cx="250" cy="70" rx="65" ry="20" fill="white"/>
    <ellipse cx="800" cy="90" rx="75" ry="18" fill="white"/>
    <ellipse cx="1500" cy="75" rx="60" ry="17" fill="white"/>
  </g>
  <!-- 飞鸟 -->
  <g fill="none" stroke="#546E7A" stroke-width="1.5" opacity="0.3">
    <path d="M350,120 Q355,115 360,120 Q365,115 370,120"/>
    <path d="M400,140 Q405,135 410,140 Q415,135 420,140"/>
    <path d="M1200,100 Q1205,95 1210,100 Q1215,95 1220,100"/>
  </g>
  <!-- 灯笼 -->
  <g transform="translate(900,350)" opacity="0.6">
    <line x1="0" y1="-15" x2="0" y2="-8" stroke="#D32F2F" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="6" ry="10" fill="#D32F2F"/>
    <rect x="-4" y="-3" width="8" height="1" fill="#FFD54F"/>
    <rect x="-4" y="2" width="8" height="1" fill="#FFD54F"/>
    <line x1="0" y1="10" x2="0" y2="15" stroke="#D32F2F" stroke-width="1"/>
  </g>
  <g transform="translate(1020,348)" opacity="0.6">
    <line x1="0" y1="-15" x2="0" y2="-8" stroke="#D32F2F" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="6" ry="10" fill="#D32F2F"/>
    <rect x="-4" y="-3" width="8" height="1" fill="#FFD54F"/>
    <rect x="-4" y="2" width="8" height="1" fill="#FFD54F"/>
    <line x1="0" y1="10" x2="0" y2="15" stroke="#D32F2F" stroke-width="1"/>
  </g>
</svg>
