<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="sky1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#B2DFDB"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="mtn1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40916c"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
    <linearGradient id="roof1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#455A64"/>
      <stop offset="100%" style="stop-color:#263238"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="600" fill="url(#sky1)"/>
  <!-- 远山 -->
  <path d="M0,350 L200,220 L400,280 L600,180 L800,260 L1000,160 L1200,240 L1400,170 L1600,250 L1920,200 L1920,600 L0,600Z" fill="url(#mtn1)" opacity="0.35"/>
  <path d="M0,400 L250,300 L500,340 L750,270 L1000,320 L1250,250 L1500,310 L1750,260 L1920,300 L1920,600 L0,600Z" fill="url(#mtn2)" opacity="0.45"/>
  <!-- 田野 -->
  <rect x="0" y="420" width="1920" height="180" fill="#a5d6a0" opacity="0.3"/>
  <!-- 古建筑群 -->
  <g transform="translate(960,300)">
    <polygon points="0,80 -120,20 -100,10 -80,20 -60,0 -40,20 -20,5 0,15 20,5 40,20 60,0 80,20 100,10 120,20 0,80" fill="url(#roof1)"/>
    <rect x="-100" y="80" width="200" height="65" fill="#EFEBE9"/>
    <rect x="-80" y="93" width="22" height="28" fill="#5D4037" rx="2"/>
    <rect x="-42" y="93" width="22" height="28" fill="#5D4037" rx="2"/>
    <rect x="20" y="93" width="22" height="28" fill="#5D4037" rx="2"/>
    <rect x="58" y="93" width="22" height="28" fill="#5D4037" rx="2"/>
    <rect x="-10" y="100" width="20" height="45" fill="#5D4037" rx="10 10 0 0"/>
    <g transform="translate(-180,25)">
      <polygon points="0,55 -60,12 -48,8 -36,14 -24,3 -12,14 0,8 12,14 24,3 36,14 48,8 60,12 0,55" fill="url(#roof1)" opacity="0.9"/>
      <rect x="-48" y="55" width="96" height="45" fill="#EFEBE9" opacity="0.9"/>
    </g>
    <g transform="translate(180,25)">
      <polygon points="0,55 -60,12 -48,8 -36,14 -24,3 -12,14 0,8 12,14 24,3 36,14 48,8 60,12 0,55" fill="url(#roof1)" opacity="0.9"/>
      <rect x="-48" y="55" width="96" height="45" fill="#EFEBE9" opacity="0.9"/>
    </g>
  </g>
  <!-- 左侧建筑 -->
  <g transform="translate(350,340)">
    <polygon points="0,50 -55,10 -45,6 -35,12 -22,0 -10,12 0,6 10,12 22,0 35,12 45,6 55,10 0,50" fill="url(#roof1)" opacity="0.7"/>
    <rect x="-42" y="50" width="84" height="40" fill="#EFEBE9" opacity="0.7"/>
  </g>
  <!-- 右侧建筑 -->
  <g transform="translate(1550,330)">
    <polygon points="0,55 -60,12 -50,8 -38,14 -25,2 -12,14 0,8 12,14 25,2 38,14 50,8 60,12 0,55" fill="url(#roof1)" opacity="0.75"/>
    <rect x="-46" y="55" width="92" height="42" fill="#EFEBE9" opacity="0.75"/>
  </g>
  <!-- 古树 -->
  <g transform="translate(150,380)">
    <rect x="-7" y="0" width="14" height="50" fill="#5D4037" opacity="0.6"/>
    <ellipse cx="0" cy="-15" rx="45" ry="38" fill="#2E7D32" opacity="0.5"/>
    <ellipse cx="-18" cy="-8" rx="30" ry="28" fill="#388E3C" opacity="0.4"/>
  </g>
  <g transform="translate(1780,370)">
    <rect x="-6" y="0" width="12" height="45" fill="#5D4037" opacity="0.6"/>
    <ellipse cx="0" cy="-12" rx="38" ry="32" fill="#2E7D32" opacity="0.5"/>
  </g>
  <!-- 石板路 -->
  <path d="M750,600 Q920,480 960,460 Q1000,480 1150,600" fill="#9E9E9E" opacity="0.2"/>
  <!-- 云 -->
  <g opacity="0.25">
    <ellipse cx="350" cy="100" rx="70" ry="25" fill="white"/>
    <ellipse cx="1200" cy="85" rx="80" ry="22" fill="white"/>
    <ellipse cx="1650" cy="120" rx="60" ry="20" fill="white"/>
  </g>
  <!-- 飞鸟 -->
  <g fill="none" stroke="#455A64" stroke-width="1.5" opacity="0.35">
    <path d="M420,140 Q425,135 430,140 Q435,135 440,140"/>
    <path d="M1100,115 Q1105,110 1110,115 Q1115,110 1120,115"/>
    <path d="M1500,145 Q1505,140 1510,145 Q1515,140 1520,145"/>
  </g>
</svg>
