<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="e5bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#e5bg)"/>
  <!-- 绣框 -->
  <rect x="80" y="40" width="240" height="200" rx="6" fill="white" stroke="#d4a373" stroke-width="1.5"/>
  <!-- 绣布 -->
  <rect x="100" y="60" width="200" height="150" fill="#FFF8DC" stroke="#d4a373" stroke-width="0.5"/>
  <!-- 刺绣图案 - 中心花朵 -->
  <g transform="translate(200,120)">
    <!-- 大花 -->
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#C0392B" opacity="0.7" transform="rotate(0)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#FF6347" opacity="0.6" transform="rotate(36)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#C0392B" opacity="0.7" transform="rotate(72)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#FF6347" opacity="0.6" transform="rotate(108)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#C0392B" opacity="0.7" transform="rotate(144)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#FF6347" opacity="0.6" transform="rotate(180)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#C0392B" opacity="0.7" transform="rotate(216)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#FF6347" opacity="0.6" transform="rotate(252)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#C0392B" opacity="0.7" transform="rotate(288)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="15" fill="#FF6347" opacity="0.6" transform="rotate(324)"/>
    <circle cx="0" cy="0" r="8" fill="#FFD700"/>
  </g>
  <!-- 左上角小花 -->
  <g transform="translate(130,85)" opacity="0.6">
    <ellipse cx="0" cy="-6" rx="4" ry="8" fill="#FF69B4" transform="rotate(0)"/>
    <ellipse cx="0" cy="-6" rx="4" ry="8" fill="#FF69B4" transform="rotate(72)"/>
    <ellipse cx="0" cy="-6" rx="4" ry="8" fill="#FF69B4" transform="rotate(144)"/>
    <ellipse cx="0" cy="-6" rx="4" ry="8" fill="#FF69B4" transform="rotate(216)"/>
    <ellipse cx="0" cy="-6" rx="4" ry="8" fill="#FF69B4" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
  </g>
  <!-- 右下角小花 -->
  <g transform="translate(270,160)" opacity="0.5">
    <ellipse cx="0" cy="-5" rx="3" ry="7" fill="#32CD32" transform="rotate(0)"/>
    <ellipse cx="0" cy="-5" rx="3" ry="7" fill="#2d6a4f" transform="rotate(60)"/>
    <ellipse cx="0" cy="-5" rx="3" ry="7" fill="#32CD32" transform="rotate(120)"/>
    <ellipse cx="0" cy="-5" rx="3" ry="7" fill="#2d6a4f" transform="rotate(180)"/>
    <ellipse cx="0" cy="-5" rx="3" ry="7" fill="#32CD32" transform="rotate(240)"/>
    <ellipse cx="0" cy="-5" rx="3" ry="7" fill="#2d6a4f" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
  <!-- 枝叶纹 -->
  <path d="M120 180 Q150 170 180 180" stroke="#2d6a4f" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M220 180 Q250 170 280 180" stroke="#2d6a4f" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- 绣针 -->
  <line x1="290" y1="90" x2="330" y2="60" stroke="#C0C0C0" stroke-width="1.5"/>
  <circle cx="330" cy="58" r="2" fill="#C0C0C0"/>
  <!-- 绣线 -->
  <path d="M290 90 Q295 95 300 90 Q305 85 310 90 Q315 95 320 90 Q325 85 330 90" stroke="#C0392B" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- 标题 -->
  <text x="200" y="260" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="13" fill="#C0392B" opacity="0.7">瑶族刺绣 · 锦上添花</text>
  <text x="200" y="280" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="10" fill="#8B7355" opacity="0.5">国家级非物质文化遗产</text>
</svg>