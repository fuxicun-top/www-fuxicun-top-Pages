<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="e3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e8f0"/>
      <stop offset="100%" stop-color="#ede0e8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#e3bg)"/>
  <!-- 舞台 -->
  <rect x="50" y="200" width="300" height="8" fill="#8B7355" rx="2"/>
  <!-- 长鼓舞者1 -->
  <g transform="translate(130,100)">
    <ellipse cx="0" cy="70" rx="22" ry="30" fill="#C0392B" opacity="0.8"/>
    <circle cx="0" cy="25" r="15" fill="#F5D0A9"/>
    <path d="M-15 12 Q0 -8 15 12" fill="#FFD700"/>
    <circle cx="0" cy="-5" r="3" fill="#FFD700"/>
    <!-- 手持长鼓 -->
    <rect x="8" y="-10" width="6" height="60" fill="#8B4513" rx="2"/>
    <ellipse cx="11" cy="-12" rx="10" ry="6" fill="#A0522D"/>
    <ellipse cx="11" cy="50" rx="8" ry="5" fill="#A0522D"/>
    <line x1="8" y1="15" x2="14" y2="15" stroke="#FFD700" stroke-width="1.5"/>
    <!-- 另一只手 -->
    <path d="M-22 55 Q-35 45 -30 35" stroke="#F5D0A9" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="-5" cy="22" r="1.5" fill="#333"/>
    <circle cx="5" cy="22" r="1.5" fill="#333"/>
  </g>
  <!-- 长鼓舞者2 -->
  <g transform="translate(270,105)">
    <ellipse cx="0" cy="65" rx="20" ry="28" fill="#2d6a4f" opacity="0.8"/>
    <circle cx="0" cy="25" r="14" fill="#F5D0A9"/>
    <path d="M-14 14 Q0 -4 14 14" fill="#1a472a"/>
    <circle cx="-4" cy="23" r="1.5" fill="#333"/>
    <circle cx="4" cy="23" r="1.5" fill="#333"/>
    <!-- 芦笙 -->
    <rect x="-15" y="-20" width="5" height="60" fill="#8B7355" rx="2"/>
    <rect x="-22" y="-12" width="4" height="48" fill="#8B7355" rx="1"/>
    <rect x="-8" y="-16" width="4" height="52" fill="#8B7355" rx="1"/>
    <!-- 手 -->
    <path d="M20 50 Q32 42 35 32" stroke="#F5D0A9" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 装饰音符 -->
  <g opacity="0.3">
    <text x="80" y="120" font-size="24" fill="#C0392B">♪</text>
    <text x="320" y="100" font-size="20" fill="#2d6a4f">♫</text>
    <text x="190" y="80" font-size="16" fill="#FFD700">♩</text>
  </g>
  <!-- 底部纹样 -->
  <path d="M0 240 Q50 235 100 240 Q150 245 200 240 Q250 235 300 240 Q350 245 400 240" stroke="#C0392B" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M0 250 Q50 245 100 250 Q150 255 200 250 Q250 245 300 250 Q350 255 400 250" stroke="#FFD700" stroke-width="0.8" fill="none" opacity="0.2"/>
  <text x="200" y="280" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="12" fill="#C0392B" opacity="0.7">长鼓舞 · 芦笙乐</text>
</svg>