<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="e2bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ede0d4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#e2bg)"/>
  <!-- 展示框 -->
  <rect x="50" y="30" width="300" height="220" rx="8" fill="white" stroke="#d4a373" stroke-width="1"/>
  <!-- 瑶族服饰展示 -->
  <!-- 女装 -->
  <g transform="translate(140,140)">
    <!-- 头饰 -->
    <path d="M-25 -55 Q0 -80 25 -55" fill="#FFD700"/>
    <path d="M-22 -55 Q0 -72 22 -55" fill="#FF6347"/>
    <circle cx="0" cy="-75" r="4" fill="#FFD700"/>
    <!-- 银饰 -->
    <circle cx="-15" cy="-50" r="2.5" fill="#C0C0C0"/>
    <circle cx="15" cy="-50" r="2.5" fill="#C0C0C0"/>
    <path d="M-10 -48 L0 -42 L10 -48" stroke="#C0C0C0" stroke-width="1.5" fill="none"/>
    <!-- 上衣 -->
    <path d="M-22 -40 L-30 -10 L-25 20 L25 20 L30 -10 L22 -40Z" fill="#C0392B"/>
    <!-- 绣花 -->
    <path d="M-15 -25 Q0 -30 15 -25" stroke="#FFD700" stroke-width="1.5" fill="none"/>
    <circle cx="-8" cy="-15" r="2" fill="#FFD700" opacity="0.8"/>
    <circle cx="8" cy="-15" r="2" fill="#FFD700" opacity="0.8"/>
    <circle cx="0" cy="-8" r="1.5" fill="#32CD32" opacity="0.7"/>
    <!-- 腰带 -->
    <rect x="-25" y="15" width="50" height="6" fill="#FFD700" rx="1"/>
    <!-- 裙子 -->
    <path d="M-25 20 L-35 80 L35 80 L25 20Z" fill="#8B0000"/>
    <!-- 裙摆绣花 -->
    <path d="M-28 40 Q0 45 28 40" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M-30 55 Q0 60 30 55" stroke="#32CD32" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M-33 70 Q0 75 33 70" stroke="#FF6347" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="-15" cy="50" r="2.5" fill="#FFD700" opacity="0.7"/>
    <circle cx="0" cy="60" r="2" fill="#32CD32" opacity="0.6"/>
    <circle cx="15" cy="50" r="2.5" fill="#FFD700" opacity="0.7"/>
  </g>
  <!-- 右侧配饰展示 -->
  <!-- 银项圈 -->
  <g transform="translate(310,80)">
    <path d="M-15 0 Q0 12 15 0" stroke="#C0C0C0" stroke-width="3" fill="none"/>
    <circle cx="0" cy="12" r="4" fill="#C0C0C0"/>
    <path d="M-3 12 L0 18 L3 12" fill="#C0C0C0"/>
  </g>
  <!-- 银手镯 -->
  <g transform="translate(310,130)">
    <ellipse cx="0" cy="0" rx="12" ry="8" stroke="#C0C0C0" stroke-width="2.5" fill="none"/>
    <circle cx="-8" cy="4" r="2" fill="#C0C0C0"/>
    <circle cx="8" cy="4" r="2" fill="#C0C0C0"/>
  </g>
  <!-- 标签 -->
  <text x="140" y="270" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="12" fill="#C0392B" opacity="0.7">瑶族服饰</text>
  <text x="310" y="170" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="10" fill="#8B7355" opacity="0.6">银饰配件</text>
  <text x="200" y="290" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="11" fill="#5C4033" opacity="0.6">锦绣华服 · 银光闪耀</text>
</svg>