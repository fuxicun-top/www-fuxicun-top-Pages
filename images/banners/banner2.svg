<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="40%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="pond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="pavilion" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#455A64"/>
      <stop offset="100%" style="stop-color:#37474F"/>
    </linearGradient>
    <linearGradient id="lotusP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD0"/>
      <stop offset="100%" style="stop-color:#E91E63;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="lotusW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FCE4EC"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="600" fill="url(#sky2)"/>
  <!-- 远山 -->
  <path d="M0,280 L300,200 L600,250 L900,180 L1200,230 L1500,190 L1920,240 L1920,600 L0,600Z" fill="#2d6a4f" opacity="0.2"/>
  <path d="M0,320 L400,260 L800,300 L1200,250 L1600,290 L1920,270 L1920,600 L0,600Z" fill="#40916c" opacity="0.25"/>
  <!-- 荷塘 -->
  <ellipse cx="960" cy="450" rx="700" ry="140" fill="url(#pond)"/>
  <ellipse cx="960" cy="450" rx="680" ry="130" fill="#81C784" opacity="0.15"/>
  <!-- 塘边石栏 -->
  <path d="M280,420 Q960,340 1640,420" fill="none" stroke="#9E9E9E" stroke-width="4" opacity="0.4"/>
  <!-- 荷叶 -->
  <g opacity="0.7">
    <ellipse cx="500" cy="430" rx="45" ry="18" fill="#4CAF50" transform="rotate(-10,500,430)"/>
    <ellipse cx="620" cy="445" rx="40" ry="15" fill="#66BB6A" transform="rotate(8,620,445)"/>
    <ellipse cx="780" cy="420" rx="50" ry="20" fill="#43A047" transform="rotate(-5,780,420)"/>
    <ellipse cx="900" cy="440" rx="42" ry="16" fill="#4CAF50" transform="rotate(12,900,440)"/>
    <ellipse cx="1050" cy="425" rx="48" ry="19" fill="#66BB6A" transform="rotate(-8,1050,425)"/>
    <ellipse cx="1200" cy="445" rx="38" ry="14" fill="#43A047" transform="rotate(15,1200,445)"/>
    <ellipse cx="1350" cy="430" rx="44" ry="17" fill="#4CAF50" transform="rotate(-12,1350,430)"/>
  </g>
  <!-- 莲花 -->
  <g transform="translate(700,410)">
    <path d="M0,-15 C-8,-30 -15,-15 -10,0 C-7,8 -2,5 0,0Z" fill="url(#lotusW)" opacity="0.9"/>
    <path d="M0,-15 C8,-30 15,-15 10,0 C7,8 2,5 0,0Z" fill="url(#lotusW)" opacity="0.9"/>
    <path d="M0,-12 C-5,-25 -10,-12 -7,0 C-5,6 -1,4 0,0Z" fill="url(#lotusP)" opacity="0.8"/>
    <path d="M0,-12 C5,-25 10,-12 7,0 C5,6 1,4 0,0Z" fill="url(#lotusP)" opacity="0.8"/>
    <line x1="0" y1="0" x2="0" y2="25" stroke="#4CAF50" stroke-width="2"/>
  </g>
  <g transform="translate(950,405)">
    <path d="M0,-18 C-10,-35 -18,-18 -12,0 C-8,10 -3,6 0,0Z" fill="url(#lotusW)" opacity="0.95"/>
    <path d="M0,-18 C10,-35 18,-18 12,0 C8,10 3,6 0,0Z" fill="url(#lotusW)" opacity="0.95"/>
    <path d="M0,-14 C-6,-28 -12,-14 -8,0 C-5,7 -2,5 0,0Z" fill="url(#lotusP)"/>
    <path d="M0,-14 C6,-28 12,-14 8,0 C5,7 2,5 0,0Z" fill="url(#lotusP)"/>
    <circle cx="0" cy="-5" r="3" fill="#FFD54F"/>
    <line x1="0" y1="0" x2="0" y2="28" stroke="#4CAF50" stroke-width="2.5"/>
  </g>
  <g transform="translate(1180,415)">
    <path d="M0,-14 C-7,-28 -14,-14 -9,0 C-6,7 -2,5 0,0Z" fill="url(#lotusW)" opacity="0.85"/>
    <path d="M0,-14 C7,-28 14,-14 9,0 C6,7 2,5 0,0Z" fill="url(#lotusW)" opacity="0.85"/>
    <path d="M0,-11 C-4,-22 -9,-11 -6,0 C-4,5 -1,3 0,0Z" fill="url(#lotusP)" opacity="0.75"/>
    <path d="M0,-11 C4,-22 9,-11 6,0 C4,5 1,3 0,0Z" fill="url(#lotusP)" opacity="0.75"/>
    <line x1="0" y1="0" x2="0" y2="22" stroke="#4CAF50" stroke-width="2"/>
  </g>
  <!-- 爱莲亭 -->
  <g transform="translate(960,320)">
    <!-- 亭顶 -->
    <polygon points="0,40 -80,5 -65,0 -50,8 -35,-5 -20,8 0,0 20,8 35,-5 50,8 65,0 80,5 0,40" fill="url(#pavilion)"/>
    <path d="M-90,5 L-100,0 L-80,3" fill="url(#pavilion)"/>
    <path d="M90,5 L100,0 L80,3" fill="url(#pavilion)"/>
    <!-- 亭柱 -->
    <rect x="-55" y="40" width="5" height="55" fill="#5D4037"/>
    <rect x="50" y="40" width="5" height="55" fill="#5D4037"/>
    <rect x="-25" y="40" width="5" height="55" fill="#5D4037"/>
    <rect x="20" y="40" width="5" height="55" fill="#5D4037"/>
    <!-- 亭内匾额 -->
    <rect x="-30" y="48" width="60" height="20" fill="#5D4037" rx="2"/>
    <text x="0" y="63" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="14" fill="#FFD54F">爱莲亭</text>
    <!-- 栏杆 -->
    <rect x="-60" y="85" width="120" height="4" fill="#5D4037" opacity="0.7"/>
    <rect x="-55" y="70" width="3" height="18" fill="#5D4037" opacity="0.5"/>
    <rect x="-25" y="70" width="3" height="18" fill="#5D4037" opacity="0.5"/>
    <rect x="22" y="70" width="3" height="18" fill="#5D4037" opacity="0.5"/>
    <rect x="52" y="70" width="3" height="18" fill="#5D4037" opacity="0.5"/>
  </g>
  <!-- 岸边柳树 -->
  <g transform="translate(250,330)">
    <rect x="-6" y="0" width="12" height="50" fill="#5D4037" opacity="0.6"/>
    <path d="M0,-10 Q-40,10 -60,40" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.5"/>
    <path d="M0,-10 Q-30,15 -45,45" fill="none" stroke="#81C784" stroke-width="2" opacity="0.4"/>
    <path d="M0,-10 Q30,20 50,50" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.5"/>
    <path d="M0,-10 Q40,15 55,40" fill="none" stroke="#81C784" stroke-width="2" opacity="0.4"/>
    <ellipse cx="0" cy="-20" rx="35" ry="25" fill="#4CAF50" opacity="0.4"/>
  </g>
  <g transform="translate(1680,340)">
    <rect x="-5" y="0" width="10" height="45" fill="#5D4037" opacity="0.6"/>
    <path d="M0,-8 Q-35,10 -50,35" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.5"/>
    <path d="M0,-8 Q30,15 45,40" fill="none" stroke="#81C784" stroke-width="2" opacity="0.4"/>
    <ellipse cx="0" cy="-18" rx="30" ry="22" fill="#4CAF50" opacity="0.4"/>
  </g>
  <!-- 云 -->
  <g opacity="0.2">
    <ellipse cx="400" cy="80" rx="75" ry="22" fill="white"/>
    <ellipse cx="1300" cy="70" rx="85" ry="20" fill="white"/>
    <ellipse cx="1700" cy="100" rx="65" ry="18" fill="white"/>
  </g>
  <!-- 蜻蜓 -->
  <g transform="translate(820,380)" opacity="0.5">
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#4CAF50" stroke-width="1.5"/>
    <ellipse cx="-5" cy="-3" rx="6" ry="2" fill="#81D4FA" opacity="0.6"/>
    <ellipse cx="5" cy="-3" rx="6" ry="2" fill="#81D4FA" opacity="0.6"/>
  </g>
</svg>
