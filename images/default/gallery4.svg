<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78B4D4"/>
      <stop offset="100%" stop-color="#C8DDE8"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect width="400" height="300" fill="url(#sky4)"/>
  <!-- 远山 -->
  <path d="M0 170 Q60 130 120 155 Q200 110 300 140 Q360 125 400 135 L400 300 L0 300Z" fill="#6a9a7a" opacity="0.4"/>
  <!-- 左岸 -->
  <path d="M0 220 Q40 200 80 215 L80 300 L0 300Z" fill="#4a7c59"/>
  <!-- 右岸 -->
  <path d="M320 215 Q360 200 400 220 L400 300 L320 300Z" fill="#4a7c59"/>
  <!-- 溪水 -->
  <path d="M80 220 Q150 210 200 218 Q250 225 320 215 L320 250 Q250 260 200 252 Q150 245 80 255Z" fill="#5BA4CF" opacity="0.6"/>
  <path d="M90 225 Q150 218 200 224 Q250 230 310 222" stroke="#8FC4E8" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- 风雨桥 -->
  <!-- 桥墩 -->
  <rect x="115" y="195" width="12" height="55" fill="#8B7355" rx="1"/>
  <rect x="275" y="195" width="12" height="55" fill="#8B7355" rx="1"/>
  <!-- 桥面 -->
  <rect x="100" y="195" width="200" height="10" fill="#A0875C" rx="1"/>
  <!-- 桥上建筑 -->
  <rect x="120" y="140" width="160" height="55" fill="#D4C5A9" rx="2"/>
  <!-- 桥屋顶 -->
  <path d="M105 140 L200 95 L295 140" fill="#5C4033"/>
  <!-- 飞檐 -->
  <path d="M103 140 Q93 137 85 128" stroke="#5C4033" stroke-width="2.5" fill="none"/>
  <path d="M297 140 Q307 137 315 128" stroke="#5C4033" stroke-width="2.5" fill="none"/>
  <!-- 桥栏杆 -->
  <line x1="120" y1="195" x2="120" y2="205" stroke="#8B7355" stroke-width="3"/>
  <line x1="160" y1="195" x2="160" y2="205" stroke="#8B7355" stroke-width="3"/>
  <line x1="240" y1="195" x2="240" y2="205" stroke="#8B7355" stroke-width="3"/>
  <line x1="280" y1="195" x2="280" y2="205" stroke="#8B7355" stroke-width="3"/>
  <line x1="120" y1="203" x2="280" y2="203" stroke="#8B7355" stroke-width="2"/>
  <!-- 桥窗 -->
  <rect x="145" y="155" width="18" height="22" fill="#4a3228" rx="1"/>
  <rect x="190" y="155" width="18" height="22" fill="#4a3228" rx="1"/>
  <rect x="235" y="155" width="18" height="22" fill="#4a3228" rx="1"/>
  <!-- 树木 -->
  <circle cx="50" cy="200" r="25" fill="#3d6b4f"/>
  <circle cx="350" cy="205" r="22" fill="#3d6b4f"/>
  <rect x="47" y="215" width="6" height="15" fill="#5C4033"/>
  <rect x="347" y="220" width="6" height="12" fill="#5C4033"/>
  <!-- 水中倒影 -->
  <path d="M120 250 Q200 260 280 250 L280 265 Q200 275 120 265Z" fill="#5BA4CF" opacity="0.3"/>
  <!-- 标题 -->
  <text x="200" y="288" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="14" fill="#3d6b4f" opacity="0.9">风雨桥</text>
</svg>