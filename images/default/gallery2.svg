<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA3D6"/>
      <stop offset="100%" stop-color="#D4E8F5"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect width="400" height="300" fill="url(#sky2)"/>
  <!-- 远景 -->
  <path d="M0 160 Q60 120 120 140 Q200 100 300 130 Q350 115 400 125 L400 300 L0 300Z" fill="#7aae8a" opacity="0.4"/>
  <!-- 爱莲堂主建筑 -->
  <rect x="100" y="120" width="200" height="120" fill="#D4C5A9" rx="2"/>
  <!-- 大屋顶 -->
  <path d="M60 120 L200 60 L340 120" fill="#5C4033" stroke="#4a3228" stroke-width="1"/>
  <!-- 飞檐 -->
  <path d="M58 120 Q48 117 40 108" stroke="#5C4033" stroke-width="3" fill="none"/>
  <path d="M342 120 Q352 117 360 108" stroke="#5C4033" stroke-width="3" fill="none"/>
  <!-- 屋脊装饰 -->
  <path d="M195 60 Q200 52 205 60" fill="#C8A96E" stroke="#a08040" stroke-width="0.5"/>
  <!-- 横匾 -->
  <rect x="155" y="130" width="90" height="30" fill="#8B0000" rx="2"/>
  <text x="200" y="152" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="18" fill="#FFD700" font-weight="bold">爱莲堂</text>
  <!-- 柱子 -->
  <rect x="120" y="160" width="8" height="80" fill="#8B0000"/>
  <rect x="272" y="160" width="8" height="80" fill="#8B0000"/>
  <rect x="196" y="160" width="8" height="80" fill="#8B0000"/>
  <!-- 台阶 -->
  <rect x="140" y="240" width="120" height="8" fill="#C4B49A"/>
  <rect x="130" y="248" width="140" height="8" fill="#B8A88E"/>
  <!-- 莲花池塘 -->
  <ellipse cx="200" cy="270" rx="100" ry="20" fill="#4A90A4" opacity="0.5"/>
  <!-- 莲花 -->
  <g transform="translate(170,262)">
    <ellipse cx="0" cy="0" rx="6" ry="3" fill="#FFB6C1" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="6" ry="3" fill="#FF69B4" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="6" ry="3" fill="#FFB6C1" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFD700"/>
  </g>
  <g transform="translate(230,268)">
    <ellipse cx="0" cy="0" rx="5" ry="2.5" fill="#FFB6C1" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="5" ry="2.5" fill="#FF69B4" transform="rotate(72)"/>
    <ellipse cx="0" cy="0" rx="5" ry="2.5" fill="#FFB6C1" transform="rotate(144)"/>
    <circle cx="0" cy="0" r="2" fill="#FFD700"/>
  </g>
  <!-- 荷叶 -->
  <ellipse cx="155" cy="272" rx="12" ry="8" fill="#2d6a4f" opacity="0.7"/>
  <ellipse cx="245" cy="270" rx="10" ry="6" fill="#2d6a4f" opacity="0.7"/>
  <!-- 标题 -->
  <text x="200" y="292" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="14" fill="#2d6a4f" opacity="0.9">爱莲堂</text>
</svg>