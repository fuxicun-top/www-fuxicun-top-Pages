<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#E8E0D4"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect width="400" height="300" fill="url(#sky3)"/>
  <!-- 石板古街 - 两侧建筑 -->
  <!-- 左侧建筑 -->
  <rect x="20" y="80" width="140" height="170" fill="#C4B49A" rx="2"/>
  <path d="M10 80 L90 40 L170 80" fill="#5C4033"/>
  <path d="M8 80 Q0 78 -5 70" stroke="#5C4033" stroke-width="2.5" fill="none"/>
  <!-- 左侧窗户排 -->
  <rect x="40" y="110" width="20" height="28" fill="#4a3228" rx="1"/>
  <line x1="50" y1="110" x2="50" y2="138" stroke="#6B5B4F" stroke-width="1"/>
  <rect x="75" y="110" width="20" height="28" fill="#4a3228" rx="1"/>
  <line x1="85" y1="110" x2="85" y2="138" stroke="#6B5B4F" stroke-width="1"/>
  <rect x="110" y="110" width="20" height="28" fill="#4a3228" rx="1"/>
  <line x1="120" y1="110" x2="120" y2="138" stroke="#6B5B4F" stroke-width="1"/>
  <!-- 左侧店铺门 -->
  <rect x="50" y="190" width="80" height="60" fill="#4a3228" rx="1"/>
  <rect x="55" y="192" width="35" height="56" fill="#6B5B4F"/>
  <rect x="95" y="192" width="35" height="56" fill="#6B5B4F"/>
  <!-- 右侧建筑 -->
  <rect x="240" y="90" width="140" height="160" fill="#D0C4A8" rx="2"/>
  <path d="M230 90 L310 50 L390 90" fill="#5C4033"/>
  <path d="M392 90 Q400 88 405 80" stroke="#5C4033" stroke-width="2.5" fill="none"/>
  <!-- 右侧窗户 -->
  <rect x="260" y="115" width="20" height="28" fill="#4a3228" rx="1"/>
  <rect x="295" y="115" width="20" height="28" fill="#4a3228" rx="1"/>
  <rect x="330" y="115" width="20" height="28" fill="#4a3228" rx="1"/>
  <!-- 右侧店铺 -->
  <rect x="265" y="195" width="80" height="55" fill="#4a3228" rx="1"/>
  <!-- 石板路 - 透视效果 -->
  <path d="M170 250 L200 300 L200 300 L170 250" fill="#8a8580" opacity="0.3"/>
  <path d="M160 250 L240 250 Q200 200 160 250Z" fill="#9a9590"/>
  <path d="M140 250 L260 250 Q200 170 140 250Z" fill="#a8a39e"/>
  <path d="M115 250 L285 250 Q200 130 115 250Z" fill="#b5b0ab"/>
  <!-- 石板纹理 -->
  <line x1="170" y1="250" x2="230" y2="250" stroke="#8a8580" stroke-width="0.5" opacity="0.5"/>
  <line x1="155" y1="235" x2="245" y2="235" stroke="#8a8580" stroke-width="0.5" opacity="0.5"/>
  <line x1="140" y1="218" x2="260" y2="218" stroke="#8a8580" stroke-width="0.5" opacity="0.5"/>
  <line x1="130" y1="200" x2="270" y2="200" stroke="#8a8580" stroke-width="0.5" opacity="0.5"/>
  <!-- 红灯笼 -->
  <line x1="155" y1="85" x2="155" y2="100" stroke="#C8A96E" stroke-width="1"/>
  <ellipse cx="155" cy="110" rx="8" ry="12" fill="#DC143C"/>
  <line x1="245" y1="95" x2="245" y2="108" stroke="#C8A96E" stroke-width="1"/>
  <ellipse cx="245" cy="118" rx="8" ry="12" fill="#DC143C"/>
  <!-- 标题 -->
  <text x="200" y="285" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="14" fill="#4a3228" opacity="0.8">石板古街</text>
</svg>