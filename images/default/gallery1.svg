<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect width="400" height="300" fill="url(#sky1)"/>
  <!-- 远山 -->
  <path d="M0 180 Q80 120 160 160 Q240 100 320 140 Q360 120 400 130 L400 300 L0 300Z" fill="#5a8a6a" opacity="0.5"/>
  <!-- 近山 -->
  <path d="M0 200 Q100 150 200 180 Q300 140 400 170 L400 300 L0 300Z" fill="#4a7c59" opacity="0.7"/>
  <!-- 地面 -->
  <path d="M0 230 Q100 210 200 220 Q300 200 400 215 L400 300 L0 300Z" fill="#3d6b4f"/>
  <!-- 青砖墙 -->
  <rect x="60" y="140" width="120" height="90" fill="#8B8682" rx="2"/>
  <rect x="60" y="140" width="120" height="8" fill="#7a7571"/>
  <!-- 屋顶 - 飞檐翘角 -->
  <path d="M40 140 L120 100 L200 140" fill="#5C4033" stroke="#4a3228" stroke-width="1"/>
  <path d="M38 140 Q30 138 25 130" stroke="#5C4033" stroke-width="2" fill="none"/>
  <path d="M202 140 Q210 138 215 130" stroke="#5C4033" stroke-width="2" fill="none"/>
  <!-- 门 -->
  <rect x="100" y="175" width="30" height="55" fill="#4a3228" rx="2"/>
  <circle cx="124" cy="200" r="2" fill="#C8A96E"/>
  <!-- 窗户 -->
  <rect x="72" y="165" width="18" height="22" fill="#4a3228" rx="1"/>
  <line x1="81" y1="165" x2="81" y2="187" stroke="#6B5B4F" stroke-width="1"/>
  <line x1="72" y1="176" x2="90" y2="176" stroke="#6B5B4F" stroke-width="1"/>
  <!-- 第二栋建筑 -->
  <rect x="230" y="155" width="100" height="75" fill="#9B9590" rx="2"/>
  <path d="M215 155 L280 118 L345 155" fill="#5C4033" stroke="#4a3228" stroke-width="1"/>
  <path d="M213 155 Q205 153 200 145" stroke="#5C4033" stroke-width="2" fill="none"/>
  <path d="M347 155 Q355 153 360 145" stroke="#5C4033" stroke-width="2" fill="none"/>
  <rect x="260" y="185" width="25" height="45" fill="#4a3228" rx="2"/>
  <circle cx="280" cy="205" r="2" fill="#C8A96E"/>
  <!-- 石板路 -->
  <path d="M115 230 L125 300" stroke="#8a8580" stroke-width="30" fill="none" opacity="0.4"/>
  <!-- 福溪水 -->
  <path d="M0 250 Q100 240 200 248 Q300 255 400 245 L400 260 Q300 268 200 260 Q100 252 0 262Z" fill="#6DB3F2" opacity="0.6"/>
  <!-- 标题 -->
  <text x="200" y="285" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="16" fill="white" opacity="0.9">古建筑群</text>
</svg>