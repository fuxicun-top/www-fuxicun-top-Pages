  <line x1="135" y1="245" x2="135" y2="255" stroke="#C8A96E"/>
  <ellipse cx="135" cy="268" rx="7" ry="12" fill="#DC143C"/>
  <line x1="265" y1="245" x2="265" y2="255" stroke="#C8A96E"/>
  <ellipse cx="265" cy="268" rx="7" ry="12" fill="#DC143C"/>
  <!-- 村口牌匾 -->
  <text x="400" y="470" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="24" fill="white" opacity="0.9">千年古村 · 福溪</text>
</svg>