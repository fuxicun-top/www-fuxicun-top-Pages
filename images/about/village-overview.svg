  <path d="M90 250 L200 190 L310 250" fill="#5C4033" stroke="#4a3228" stroke-width="1"/>
  <path d="M88 250 Q75 246 65 235" stroke="#5C4033" stroke-width="3" fill="none"/>
  <path d="M312 250 Q325 246 335 235" stroke="#5C4033" stroke-width="3" fill="none"/>
