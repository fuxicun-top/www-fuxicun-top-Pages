  <rect x="420" y="270" width="120" height="90" fill="#C4B49A" rx="2"/>
  <path d="M400 270 L480 225 L560 270" fill="#5C4033"/>
  <path d="M398 270 Q388 267 380 258" stroke="#5C4033" stroke-width="2.5" fill="none"/>
  <path d="M562 270 Q572 267 580 258" stroke="#5C4033" stroke-width="2.5" fill="none"/>
  <rect x="445" y="300" width="20" height="28" fill="#4a3228" rx="1"/>
  <rect x="490" y="300" width="20" height="28" fill="#4a3228" rx="1"/>
  <rect x="450" y="340" width="60" height="20" fill="#4a3228" rx="1"/>
  <!-- 远处风雨桥 -->
  <rect x="580" y="295" width="8" height="55" fill="#8B7355"/>
  <rect x="680" y="295" width="8" height="55" fill="#8B7355"/>
  <rect x="570" y="295" width="128" height="8" fill="#A0875C"/>
  <rect x="585" y="260" width="100" height="35" fill="#D4C5A9" rx="1"/>
