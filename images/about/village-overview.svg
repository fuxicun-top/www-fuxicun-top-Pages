  <rect x="140" y="290" width="8" height="70" fill="#8B0000"/>
  <rect x="195" y="290" width="8" height="70" fill="#8B0000"/>
  <rect x="252" y="290" width="8" height="70" fill="#8B0000"/>
  <!-- 匾额 -->
  <rect x="170" y="260" width="60" height="24" fill="#8B0000" rx="2"/>
  <text x="200" y="278" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="14" fill="#FFD700">福溪</text>
  <!-- 台阶 -->
  <rect x="155" y="360" width="90" height="6" fill="#C4B49A"/>
  <rect x="145" y="366" width="110" height="6" fill="#B8A88E"/>
