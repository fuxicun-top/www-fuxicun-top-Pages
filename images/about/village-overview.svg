  <path d="M0 260 Q100 190 200 230 Q300 170 400 210 Q500 160 600 200 Q700 170 800 220 L800 500 L0 500Z" fill="#7aae8a" opacity="0.4"/>
  <path d="M0 290 Q150 230 300 270 Q450 210 600 260 Q700 230 800 250 L800 500 L0 500Z" fill="#5a8a6a" opacity="0.5"/>
