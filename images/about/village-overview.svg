  <circle cx="50" cy="310" r="35" fill="#3d6b4f"/>
  <rect x="46" y="340" width="8" height="20" fill="#5C4033"/>
  <circle cx="750" cy="320" r="30" fill="#3d6b4f"/>
  <rect x="746" y="348" width="8" height="18" fill="#5C4033"/>
