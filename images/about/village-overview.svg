<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="vsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA4CF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3D8EB9" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect width="800" height="500" fill="url(#vsky)"/>
  <!-- 太阳 -->
  <circle cx="680" cy="70" r="40" fill="#FFD700" opacity="0.7"/>
  <circle cx="680" cy="70" r="35" fill="#FFF8DC" opacity="0.5"/>
