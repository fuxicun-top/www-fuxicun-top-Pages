  <path d="M0 370 Q200 360 400 375 Q600 385 800 365 L800 420 Q600 440 400 425 Q200 410 0 430Z" fill="url(#water)"/>
  <path d="M50 390 Q150 385 250 392" stroke="#8FC4E8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M400 400 Q500 395 600 402" stroke="#8FC4E8" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- 石板路 -->
  <path d="M180 360 L200 500 L220 500 L195 360" fill="#9a9590" opacity="0.4"/>
