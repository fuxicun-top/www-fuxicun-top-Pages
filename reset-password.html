<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="重置福溪村官网账号密码">
  <title>重置密码 - 福溪村</title>

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/login.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-logo">福溪村</h1>
        <p class="auth-subtitle">重置密码</p>
      </div>

      <form id="reset-form">
        <input type="hidden" name="token" id="reset-token">
        <div class="form-group">
          <label class="form-label">新密码</label>
          <input type="password" name="password" class="form-input" placeholder="请输入新密码（不少于8位）" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">确认密码</label>
          <input type="password" name="passwordConfirm" class="form-input" placeholder="请再次输入新密码" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-reset">重置密码</button>
      </form>

      <div class="auth-footer">
        <a href="/login.html" class="auth-link">返回登录</a>
      </div>
    </div>

    <a href="/" class="auth-back">&larr; 返回首页</a>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/pages/reset-password.js"></script>
</body>
</html>
