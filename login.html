<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="登录福溪村官网">
  <meta name="keywords" content="福溪村,登录">
  <title>登录 - 福溪村</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/login.css">
  <script src="/js/common/theme-loader.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-logo">福溪村</h1>
        <p class="auth-subtitle">用户登录</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">用户名 / 手机号</label>
          <input type="text" name="username" class="form-input" placeholder="请输入用户名或手机号" autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" name="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
        </div>

        <div class="form-group form-options">
          <label class="form-check">
            <input type="checkbox" name="remember">
            <span>记住我</span>
          </label>
          <a href="/forgot-password.html" class="auth-link">忘记密码？</a>
        </div>

        <div class="turnstile-container" id="turnstile-container"></div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-login">登录</button>
      </form>

      <div class="auth-footer">
        还没有账号？<a href="/register.html" class="auth-link">立即注册</a>
      </div>
    </div>

    <a href="/" class="auth-back">← 返回首页</a>
  </div>

  <script src="/js/common/config.js"></script>
  <script src="/js/common/storage.js"></script>
  <script src="/js/common/utils.js"></script>
  <script src="/js/common/api.js"></script>
  <script src="/js/common/auth.js"></script>
  <script src="/js/common/toast.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
