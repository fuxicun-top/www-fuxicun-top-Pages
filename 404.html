<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - 福溪村</title>
  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/css/common/reset.css">
  <link rel="stylesheet" href="/css/common/variables.css">
  <link rel="stylesheet" href="/css/common/typography.css">
  <link rel="stylesheet" href="/css/common/utilities.css">
  <style>
    .error-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .error-page__content {
      max-width: 500px;
    }
    .error-page__code {
      font-size: 120px;
      font-weight: 500;
      color: var(--color-primary, #2d6a4f);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-page__title {
      font-size: 24px;
      font-weight: 500;
      color: var(--color-text-primary, #1a1a2e);
      margin-bottom: 12px;
    }
    .error-page__desc {
      font-size: 16px;
      color: var(--color-text-secondary, #666);
      line-height: 1.8;
      margin-bottom: 32px;
    }
    .error-page__btn {
      display: inline-block;
      padding: 12px 32px;
      background: var(--color-primary, #2d6a4f);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.2s;
    }
    .error-page__btn:hover {
      background: var(--color-primary-light, #40916c);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__content">
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">页面未找到</h1>
      <p class="error-page__desc">您访问的页面不存在或已被移除。<br>请检查网址是否正确，或返回首页浏览。</p>
      <a href="/" class="error-page__btn">返回首页</a>
    </div>
  </div>
</body>
</html>
