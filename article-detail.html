          <h1 class="article-detail__title">欢迎来到福溪村</h1>
          <div class="article-detail__meta">

        <img src="/images/default/article.svg" alt="福溪村" class="article-detail__cover" loading="lazy">
        <div class="article-detail__content">
          <p>福溪村位于广西贺州市富川瑶族自治县朝东镇，始建于宋代，距今已有千年历史。村落保存着完好的明清古建筑群，是周敦颐理学思想的重要传承地，也是瑶族文化的活态博物馆。</p>
          <p>这里青砖黛瓦、飞檐翘角，古戏台、爱莲堂、石板古街、风雨桥等古建筑错落有致，展现着岭南建筑艺术的精髓。漫步其中，仿佛穿越时空，感受千年古村的静谧与美好。</p>
          <p>福溪村不仅是一座建筑博物馆，更是理学文化的传承圣地。周敦颐"出淤泥而不染，濯清涟而不妖"的精神在这里代代相传，影响着一代又一代的福溪人。</p>
        </div>
        <div class="article-detail__actions">
          <button class="btn-like" id="btn-like"><span>&#9829;</span> <span id="like-count">0</span></button>
